apiVersion: v1
kind: Service
metadata:
  name: {{ include "artifact-repository.fullname" . }}
  labels:
    {{- include "artifact-repository.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "artifact-repository.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
