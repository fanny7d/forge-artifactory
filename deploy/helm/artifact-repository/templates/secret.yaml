{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "artifact-repository.fullname" . }}
  labels:
    {{- include "artifact-repository.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseURL | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | quote }}
  TOKEN_PEPPER: {{ .Values.secrets.tokenPepper | quote }}
  IDEMPOTENCY_RESPONSE_KEY: {{ .Values.secrets.idempotencyResponseKey | quote }}
{{- end }}
