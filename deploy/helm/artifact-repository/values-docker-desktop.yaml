image:
  repository: artifact-repository
  tag: local
  pullPolicy: Never

fullnameOverride: forge-artifactory

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "43200"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "43200"
  hosts:
    - host: forge.fanchao.local
      paths:
        - path: /
          pathType: Prefix

signing:
  existingSecret: forge-artifactory-signing-key
