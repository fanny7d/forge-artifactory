apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "artifact-repository-local.fullname" . }}-minio-init
  labels:
    {{- include "artifact-repository-local.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 180
  template:
    metadata:
      labels:
        {{- include "artifact-repository-local.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: Never
      containers:
        - name: minio-init
          image: {{ .Values.minio.clientImage }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-repository-local.fullname" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "artifact-repository-local.fullname" . }}
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local http://{{ include "artifact-repository-local.fullname" . }}-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 2
              done
              mc mb --ignore-existing local/{{ .Values.minio.bucket }}
