version: "2"
sql:
  - engine: postgresql
    schema: internal/database/migrations
    queries: internal/database/queries
    gen:
      go:
        package: sqlc
        out: internal/database/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: UUID
              pointer: true
