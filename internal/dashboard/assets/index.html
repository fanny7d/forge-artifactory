<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Forge Artifactory</title>
  <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
  <div id="login-view" class="login-view">
    <main class="login-panel">
      <div class="brand-mark" aria-hidden="true">FA</div>
      <p class="eyebrow">CLI 版本发布中心</p>
      <h1>Forge Artifactory</h1>
      <p class="login-copy">连接当前实例，管理 CLI 版本与多平台制品。</p>
      <form id="login-form" class="form-stack">
        <label for="token">Bearer Token</label>
        <div class="secret-field">
          <input id="token" name="token" type="password" autocomplete="current-password" placeholder="ar1..." required>
          <button id="toggle-token" class="icon-button" type="button" aria-label="显示 Token" title="显示或隐藏 Token">显示</button>
        </div>
        <label class="checkbox-row">
          <input id="remember-token" type="checkbox">
          <span>在此浏览器中保持登录</span>
        </label>
        <button class="button primary wide" type="submit">连接实例</button>
        <p id="login-error" class="form-error" role="alert"></p>
      </form>
      <div class="instance-health"><span id="login-health-dot" class="status-dot"></span><span id="login-health">正在检查服务状态</span></div>
    </main>
  </div>

  <div id="app" class="app-shell" hidden>
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark small" aria-hidden="true">FA</div>
        <div><strong>Forge</strong><span>CLI Releases</span></div>
      </div>
      <nav id="primary-nav" class="primary-nav" aria-label="主导航">
        <a href="#/products" data-route="products">CLI 制品库</a>
      </nav>
      <div class="sidebar-footer">
        <div class="health-line"><span id="health-dot" class="status-dot"></span><span id="health-text">检查中</span></div>
        <button id="logout" class="button subtle wide" type="button">退出登录</button>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p id="breadcrumb" class="breadcrumb">Forge</p>
          <h1 id="page-title">CLI 制品库</h1>
        </div>
        <div id="page-actions" class="page-actions"></div>
      </header>
      <main id="content" class="content" tabindex="-1"></main>
    </section>
  </div>

  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <dialog id="dialog" class="dialog" aria-labelledby="dialog-title">
    <form id="dialog-form">
      <div class="dialog-header">
        <div><p id="dialog-eyebrow" class="eyebrow"></p><h2 id="dialog-title"></h2></div>
        <button id="dialog-close" class="icon-button" type="button" aria-label="关闭" title="关闭">×</button>
      </div>
      <div id="dialog-body" class="dialog-body"></div>
      <p id="dialog-error" class="form-error" role="alert"></p>
      <div class="dialog-actions">
        <button id="dialog-cancel" class="button subtle" type="button">取消</button>
        <button id="dialog-submit" class="button primary" type="submit">确认</button>
      </div>
    </form>
  </dialog>
  <script src="/dashboard/app.js" defer></script>
</body>
</html>
